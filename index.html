<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Londrina+Shadow&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:#ffd6e7;
  width: 100vw;
  height: 100vh;
}

#menu{
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 50px;
  background: url(https://raw.githubusercontent.com/luana-76/imgHello/main/imagem2.png) center;
  background-size: cover;
  background-position-y: -76px;
  background-repeat: no-repeat;
  z-index: 10;
}

button{
  padding:15px 35px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#ff69b4;
  color:white;
  cursor:pointer;
}

canvas{
  width:100vw;
  height:100vh;
  display:none;
  background:
  linear-gradient(rgba(255,255,255,0.35),rgba(255,255,255,0.35)),
  url(./fundoJogo.png);
  pointer-events:none;
}

#controls{
  position:fixed;
  bottom: 66px;
  right: 17px;
  display:none;
  z-index:20;
}

#dpad{
  position:relative;
  width:150px;
  height:150px;
}

.btn{
  position:absolute;
  width:50px;
  height:50px;
  background:rgba(255,105,180,0.85);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
}

.up{top:0;left:50px;}
.down{bottom:0;left:50px;}
.left{left:0;top:50px;}
.right{right:0;top:50px;}

#gameOver{
  position:fixed;
  inset:0;
  background:rgba(255,214,231,.95);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

#gameOver{
  position:fixed;
  inset:0;
  background:#e066c2;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}

#gameOver{
  position:fixed;
  inset:0;
  background:#d86acb;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
  font-family: "Londrina Shadow", sans-serif;
  font-weight: 500;
}

/* CARD */
.cardGameOver{
  position:relative;
  width:260px;
  height:260px;
  background:#e9e9e9;
  border-radius:20px;
  padding-top:50px;
  text-align:center;
  box-shadow:0 0 0 3px #ff69b4;
}

/* COOKIE IMAGEM */
.cookieImg{
  position:absolute;
  top:-70px;
  left:50%;
  transform:translateX(-50%);
  width:150px;
}

.cookiesTop{
  position:absolute;
  top:-80px;
  left:50%;
  transform:translateX(-50%);
  width:200px;
  height:100px;
}

/* TODOS */
.cookie{
  position:absolute;
  object-fit:contain;
}

/* COOKIE DO MEIO (MAIOR) */
.cookie.center{
  width:140px;
  left:50%;
  transform:translateX(-50%);
  z-index:2;
}

/* LATERAIS (MENORES) */
.cookie.left{
  width:90px;
  left: -16px;
  top:20px;
  transform:rotate(-15deg);
  z-index:1;
}

.cookie.right{
  width:90px;
  right: -16px;
  top:20px;
  transform:rotate(15deg);
  z-index:1;
}

.cookie{
  filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
}

/* TÍTULO */
.titleLose{
  display:inline-block;
  background:white;
  padding:5px 15px;
  border-radius:10px;
  border:2px solid #ff69b4;
  box-shadow:0 3px #ff69b4;
  margin-bottom:15px;
}

/* SCORE */
.scoreBox{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-size: 2em;
}

.icon{
  border:2px solid #ff69b4;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 34px;
  padding: 5px 0;
  width: 54px;

}

/* BOTÃO SETA */
.btnRestart{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:#ff69b4;
  color:white;
  font-size:24px;
  cursor:pointer;
  box-shadow:0 4px #c2185b;
}

.btnRestart:active{
  box-shadow:0 2px #c2185b;
}

/* CARD */
.cardGameOver{
  position:relative;
  width:280px;
  background:#eee;
  border-radius:20px;
  padding:30px 20px;
  text-align:center;
  box-shadow:0 0 0 3px #ff69b4, 0 10px 25px rgba(0,0,0,0.2);
}

/* COOKIE TOPO */
.cookieTop{
  position:absolute;
  top:-60px;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  height:80px;
  background:#d7a86e;
  border-radius:80px 80px 0 0;
  box-shadow: inset 0 -5px rgba(0,0,0,0.1);
}

/* gotas chocolate */
.cookieTop::before,
.cookieTop::after{
  content:"";
  position:absolute;
  width:12px;
  height:12px;
  background:#5d4037;
  border-radius:50%;
}

.cookieTop::before{
  top:20px;
  left:30px;
}

.cookieTop::after{
  top:25px;
  right:30px;
}

/* título */
.cardGameOver h2 {
  position: absolute;
  top: -4%;
  left: 24%;
  background: #fff;
  display: inline-block;
  padding: 5px 15px;
  border-radius: 10px;
  border: 2px solid #ff69b4;
  box-shadow: 0 4px #ff69b4;
  font-weight: 500;
  font-size: 2em;

}

/* SCORE */
.scoreBox{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin: 55px 0;
  font-size: 2em;
}

.icon:active{
  transform:scale(0.9);
  background:#ffe4f1;
}

/* BOTÃO */
.btnRestart {
    margin-top: 10px;
    /* padding: 12px 20px; */
    border: none;
    border-radius: 10px;
    background: #ff69b4;
    color: white;
    font-size: 16px;
    display: flex;
    cursor: pointer;
    box-shadow: 0 4px #c2185b;
    font-size: 2em;
    align-items: center;
    justify-content: center;
}

.btnRestart:active{
  
  box-shadow:0 2px #c2185b;
}

video{display:none;}
</style>
</head>

<body>

<div id="menu">
  <button onclick="startGame('normal')">Modo Normal</button>
  <button onclick="startGame('camera')">Modo Câmera</button>
</div>

<div id="gameOver">
  <div class="cardGameOver">

    <!-- IMAGEM DO COOKIE -->
    <div class="cookiesTop">
      <img src="https://raw.githubusercontent.com/luana-76/imgHello/main/cookie2.png" class="cookie left">
      <img src="https://raw.githubusercontent.com/luana-76/imgHello/main/cookie2.png" class="cookie center">
      <img src="https://raw.githubusercontent.com/luana-76/imgHello/main/cookie2.png" class="cookie right">
    </div>

    <h2 class="titleLose">Você perdeu</h2>

    <div class="scoreBox">
      <button class="icon" onclick="restartGame()">⟳</button>
      <p id="finalScore">Score: 0</p>
    </div>

    <button onclick="goToMenu()" class="btnRestart">
      ↩
    </button>

  </div>
</div>

<video id="camera" autoplay playsinline></video>
<canvas id="game"></canvas>

<div id="controls">
  <div id="dpad">
    <div class="btn up" onclick="setDir('UP')">▲</div>
    <div class="btn left" onclick="setDir('LEFT')">◀</div>
    <div class="btn right" onclick="setDir('RIGHT')">▶</div>
    <div class="btn down" onclick="setDir('DOWN')">▼</div>
  </div>
</div>

<script>

let boss = null;
let bossActive = false;
let bossStartTime = 0;
let bossInterval;
let dangerEffect = 0;
let combo = 0;
let comboTimer = 0;
let gameRunning = false;
let kangarooActive = false;
let kangarooTimer = 0;

let displayWidth, displayHeight;
const eatSound = new Audio("https://raw.githubusercontent.com/luana-76/imgHello/main/comendo.mp3");
eatSound.volume = 0.5; // volume (0 a 1)

const loseSound = new Audio("https://raw.githubusercontent.com/luana-76/imgHello/main/fimDeJogo.mp3"); // 🔥 novo som
loseSound.volume = 0.6;

const bottomSafeArea = 140; // altura dos botões
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const video = document.getElementById("camera");

function drawHole(x, y){
  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.arc(x + box/2, y + box/2, box*0.4, 0, Math.PI*2);
  ctx.fill();
}

function drawBoss(x, y){
  const t = Date.now() * 0.005;

  // aura
  ctx.fillStyle = "rgba(255,0,0,0.2)";
  ctx.beginPath();
  ctx.arc(x + box/2, y + box/2, box*0.6, 0, Math.PI*2);
  ctx.fill();

  // corpo
  ctx.fillStyle = "#111";
  ctx.beginPath();
  ctx.arc(x + box/2, y + box/2, box*0.4, 0, Math.PI*2);
  ctx.fill();

  // olhos pulsando
  ctx.fillStyle = "red";
  const pulse = Math.sin(t) * 2;

  ctx.beginPath();
  ctx.arc(x + box*0.35, y + box*0.4, 3 + pulse, 0, Math.PI*2);
  ctx.arc(x + box*0.65, y + box*0.4, 3 + pulse, 0, Math.PI*2);
  ctx.fill();
}

function resizeCanvas(){
  const scale = window.devicePixelRatio || 1;

  canvas.width = window.innerWidth * scale;
  canvas.height = window.innerHeight * scale;

  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";

  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let snake, lastDirection, food, score, loop, mode;
const cols = 12; // quantidade de colunas (controle do tamanho)
let box;

function updateGrid(){
  const width = window.innerWidth; // 🔥 usar tamanho real da tela
  box = Math.floor(width / cols);  // grid proporcional à tela
}
updateGrid();
window.addEventListener("resize", updateGrid);


function spawnBoss(){
  bossActive = true;
  bossStartTime = Date.now();

  boss = {
    x: Math.floor(Math.random() * (canvas.clientWidth / box)) * box,
    y: Math.floor(Math.random() * (canvas.clientHeight / box)) * box,
    speed: 0.12,
    spawnTime: Date.now(),
    dashCooldown: 0,
    velocityX: 0,
    velocityY: 0
  };
}


async function startGame(selectedMode){
  mode = selectedMode;
  gameRunning = true;

  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";

  snake = [{
  x: Math.floor((window.innerWidth / 2) / box) * box,
  y: Math.floor((window.innerHeight / 2) / box) * box
}];
  lastDirection = null;
  score = 0;
  food = randomFood();

  clearInterval(loop);
  function gameSpeed(){
      return Math.max(80, 200 - score * 5); // acelera com score
  }

    clearInterval(loop);

    function gameLoop(){
      if(!gameRunning) return; // 🔥 PARA O LOOP

      draw();
      setTimeout(gameLoop, Math.max(80, 200 - score * 5));
    }

    gameLoop();
    

  if(mode === "camera"){
    await requestCamera();
    startCamera();
  }else{
    document.getElementById("controls").style.display = "block";
  }

  // primeiro spawn (10s)
// primeiro spawn depois de 1 minuto (60s)
setTimeout(()=>{
  spawnBoss();

  // depois reaparece a cada 40s
  bossInterval = setInterval(()=>{
    if(!bossActive){
      spawnBoss();
    }
  }, 40000);

}, 60000); // ⏱️ 1 minuto

}

async function requestCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;
  }catch{
    alert("Permita a câmera.");
  }
}

function setDir(dir){
  lastDirection = dir;
}
function drawEgg(x, y){
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.ellipse(
    x + box/2,
    y + box/2,
    box * 0.3,
    box * 0.4,
    0,
    0,
    Math.PI * 2
  );
  ctx.fill();

  ctx.strokeStyle = "#ddd";
  ctx.stroke();
}
let foodType = "cookie"; // cookie | egg


function randomFood(){
  const maxCols = Math.floor(window.innerWidth / box);
  const maxRows = Math.floor((window.innerHeight - bottomSafeArea) / box);

  let newFood;

  do{
    newFood = {
      x: Math.floor(Math.random() * maxCols) * box,
      y: Math.floor(Math.random() * maxRows) * box
    };
  }while(snake.some(s => s.x === newFood.x && s.y === newFood.y));

  // 🥚 30% de chance de ser ovo
  foodType = Math.random() < 0.3 ? "egg" : "cookie";

  return newFood;
}

/* HELLO KITTY */
function drawHelloKitty(x, y){
  const cx = x + 15;
  const cy = y + 15;

  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(cx, cy, 15, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#000";
  ctx.beginPath(); ctx.arc(cx-5, cy-2, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+5, cy-2, 2, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = "#ffcc00";
  ctx.beginPath();
  ctx.ellipse(cx, cy+2, 2.5, 1.8, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle="#000";
  ctx.beginPath();
  ctx.moveTo(cx-10, cy); ctx.lineTo(cx-16, cy-2);
  ctx.moveTo(cx-10, cy+3); ctx.lineTo(cx-16, cy+3);
  ctx.moveTo(cx+10, cy); ctx.lineTo(cx+16, cy-2);
  ctx.moveTo(cx+10, cy+3); ctx.lineTo(cx+16, cy+3);
  ctx.stroke();

  ctx.fillStyle="#ff69b4";
  ctx.beginPath(); ctx.arc(cx-8, cy-10, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx-2, cy-10, 5, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle="#ff1493";
  ctx.beginPath(); ctx.arc(cx-5, cy-10, 2, 0, Math.PI*2); ctx.fill();
}

/* COOKIE */
function drawCookie(x, y){
  const size = box;
  const pulse = Math.sin(Date.now()*0.005) * 2;

  ctx.save();

  ctx.fillStyle="#d7a86e";
  ctx.beginPath();
  ctx.arc(x+size/2,y+size/2,size*0.45 + pulse,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#5d4037";

  [[0.3,0.3],[0.7,0.4],[0.6,0.7],[0.4,0.75],[0.5,0.5]]
  .forEach(c=>{
    ctx.beginPath();
    ctx.arc(
      x + size*c[0],
      y + size*c[1],
      size*0.08,
      0,
      Math.PI*2
    );
    ctx.fill();
  });

  ctx.restore();
}

function drawCart(x, y){
  const size = box;

  // carrinho (base)
  ctx.fillStyle = "#ff69b4";
  ctx.fillRect(x + size*0.2, y + size*0.5, size*0.6, size*0.25);

  // rodinhas
  ctx.fillStyle = "#333";
  ctx.beginPath();
  ctx.arc(x + size*0.3, y + size*0.8, size*0.1, 0, Math.PI*2);
  ctx.arc(x + size*0.7, y + size*0.8, size*0.1, 0, Math.PI*2);
  ctx.fill();

  // biscoito dentro do carrinho
  ctx.fillStyle="#d7a86e";
  ctx.beginPath();
  ctx.arc(x + size*0.5, y + size*0.45, size*0.18, 0, Math.PI*2);
  ctx.fill();

  // gotas chocolate
  ctx.fillStyle="#5d4037";
  ctx.beginPath();
  ctx.arc(x + size*0.45, y + size*0.43, size*0.03, 0, Math.PI*2);
  ctx.arc(x + size*0.55, y + size*0.47, size*0.03, 0, Math.PI*2);
  ctx.fill();
}

/* LOOP (ATUALIZADO) */
let shake = 0;
function draw(){

  if(shake > 0){
    ctx.save();
    ctx.translate(
      Math.random() * shake - shake/2,
      Math.random() * shake - shake/2
    );
    shake *= 0.9;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(foodType === "egg"){
  drawEgg(food.x, food.y);
}else{
  drawCookie(food.x, food.y);
}

snake.forEach((s,i)=>{
  if(i === 0){
    if(kangarooActive){
      drawKittyOnKangaroo(s.x, s.y);
    }else{
      drawHelloKitty(s.x, s.y);
    }
  }else{
    drawCart(s.x, s.y);
  }
});

  ctx.fillStyle="#fff";
  ctx.font = "28px Arial";
  ctx.fillText("Score: "+score,20,30);

  if(!lastDirection) return;

  let headX = snake[0].x;
  let headY = snake[0].y;

  if(lastDirection==="LEFT") headX-=box;
  if(lastDirection==="RIGHT") headX+=box;
  if(lastDirection==="UP") headY-=box;
  if(lastDirection==="DOWN") headY+=box;

  // 🔥 COLISÃO COM CORPO
  for(let i = 0; i < snake.length; i++){
    if(snake[i].x === headX && snake[i].y === headY){
      endGame();
      return;
    }
  }

  // 🔥 COMIDA
if(headX === food.x && headY === food.y){

  score++;
  document.getElementById("finalScore").innerText = "Score: " + score;

  // 🦘 só ativa se for OVO
  if(foodType === "egg"){
    kangarooActive = true;
    kangarooTimer = Date.now();
  }

  eatSound.currentTime = 0;
  eatSound.play();

  food = randomFood();
}else{
  snake.pop();
}

  // 🔥 PAREDE
  const maxX = Math.floor(canvas.clientWidth / box) * box;
  const maxY = Math.floor(canvas.clientHeight / box) * box;

  if(
    headX < 0 ||
    headY < 0 ||
    headX >= maxX ||
    headY >= maxY
  ){
    endGame();
    return;
  }

  // 🔥 ATUALIZA COBRA
  snake.unshift({x:headX,y:headY});

  /// =========================
// 🧟 BOSS MELHORADO
// =========================
if(bossActive && boss){

  const now = Date.now();

  // tempo total (20s)
  if(now - bossStartTime > 20000){
    bossActive = false;
    boss = null;
  }else{

    let target = snake[0];

    // 🧠 previsão mais inteligente
    let futureX = target.x;
    let futureY = target.y;

    //Prever 2 blocos a frente
    if(lastDirection === "LEFT") futureX -= box * 2;
    if(lastDirection === "RIGHT") futureX += box * 2;
    if(lastDirection === "UP") futureY -= box * 2;
    if(lastDirection === "DOWN") futureY += box * 2;


    // ⚡ dificuldade progressiva
    let timeAlive = (now - bossStartTime) / 1000;
    let speed = 0.15 + (timeAlive * 0.015);

    // 💥 DASH CONTROLADO

    if(now > boss.dashCooldown){
      boss.isDashing = true;
      boss.dashCooldown = now + 4000;
      boss.dashEnd = now + 300;

      shake = 10; // 💥 ativa tremor
    }

    if(now > boss.dashCooldown){
      boss.isDashing = true;
      boss.dashCooldown = now + 4000;
      boss.dashEnd = now + 300;
    }

    if(boss.isDashing){
      speed *= 4;
      if(now > boss.dashEnd){
        boss.isDashing = false;
      }
    }

    // 🧠 movimento suave (sem travar eixo)
    let dx = futureX - boss.x;
    let dy = futureY - boss.y;

    let dist = Math.sqrt(dx*dx + dy*dy) || 1;

    let moveX = (dx / dist) * box * speed;
    let moveY = (dy / dist) * box * speed;

    boss.x += moveX;
    boss.y += moveY;

    // 🌀 animação de spawn
    let scale = Math.min(1, (now - boss.spawnTime) / 400);

    ctx.save();
    ctx.translate(boss.x + box/2, boss.y + box/2);
    ctx.scale(scale, scale);
    ctx.translate(-(boss.x + box/2), -(boss.y + box/2));

    drawHole(boss.x, boss.y);
    drawBoss(boss.x, boss.y);

    ctx.restore();

    // 💀 colisão melhorada
    if(
      headX < boss.x + box * 0.7 &&
      headX + box * 0.7 > boss.x &&
      headY < boss.y + box * 0.7 &&
      headY + box * 0.7 > boss.y
    ){
      endGame();
      return;
    }
  }

  // reset combo se demorar
  if(Date.now() - comboTimer > 2000){
    combo = 0;
  }

  if(combo > 1){
    ctx.fillStyle = "#ff1493";
    ctx.font = "bold 24px Arial";
    ctx.fillText("COMBO x" + combo, 20, 60);
  }
}

if(bossActive){
  dangerEffect = Math.min(1, dangerEffect + 0.02);
}else{
  dangerEffect = Math.max(0, dangerEffect - 0.02);
}

// efeito vermelho
if(dangerEffect > 0){
  ctx.fillStyle = `rgba(255,0,0,${dangerEffect * 0.2})`;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

if(shake > 0){
  ctx.restore();
}

if(kangarooActive && Date.now() - kangarooTimer > 5000){
  kangarooActive = false;
}

}


/* CAMERA */
function startCamera(){
  const hands = new Hands({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.3/${file}`
  });

  hands.setOptions({
    maxNumHands:1,
    modelComplexity:0,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
  });

  hands.onResults((res)=>{
    if(res.multiHandLandmarks && res.multiHandLandmarks.length){
      const p = res.multiHandLandmarks[0][8];

      const dx = p.x - 0.5;
      const dy = p.y - 0.5;

      if(Math.abs(dx) > Math.abs(dy)){
        lastDirection = dx > 0 ? "LEFT" : "RIGHT";
      } else {
        lastDirection = dy > 0 ? "DOWN" : "UP";
      }
    }
  });

  new Camera(video,{
    onFrame: async ()=>{
      try{
        await hands.send({image:video});
      }catch(e){
        console.log(e);
      }
    },
    width:640,
    height:480
  }).start();
}

function endGame(){
  gameRunning = false; // 🔥 PARA TUDO

  loseSound.pause(); // evita sobreposição
  loseSound.currentTime = 0;
  loseSound.play();

  document.getElementById("gameOver").style.display = "flex";

}

loseSound.pause();
loseSound.currentTime = 0;
loseSound.play().catch(()=>{});

function restartGame(){
  document.getElementById("gameOver").style.display = "none";
  document.getElementById("controls").style.display = "none";
  canvas.style.display = "none";

  startGame(mode);
}

function goToMenu(){
  // esconder game over
  document.getElementById("gameOver").style.display = "none";

  // esconder jogo
  canvas.style.display = "none";

  // esconder controles
  document.getElementById("controls").style.display = "none";

  // mostrar menu inicial
  document.getElementById("menu").style.display = "flex";

  // parar jogo
  clearInterval(loop);
}

function getControlsArea(){
  const controls = document.getElementById("controls");

  if(controls.style.display === "none"){
    return null;
  }

  return controls.getBoundingClientRect();
}

function drawKangaroo(x, y){
  const size = box;

  // corpo
  ctx.fillStyle = "#c68642";
  ctx.beginPath();
  ctx.ellipse(x + size/2, y + size*0.65, size*0.45, size*0.28, 0, 0, Math.PI*2);
  ctx.fill();

  // cabeça
  ctx.beginPath();
  ctx.ellipse(x + size*0.15, y + size*0.55, size*0.18, size*0.15, 0, 0, Math.PI*2);
  ctx.fill();

  // orelha
  ctx.beginPath();
  ctx.ellipse(x + size*0.1, y + size*0.3, size*0.08, size*0.2, 0, 0, Math.PI*2);
  ctx.fill();

  // rabo
  ctx.beginPath();
  ctx.ellipse(x + size*0.9, y + size*0.75, size*0.4, size*0.1, 0.3, 0, Math.PI*2);
  ctx.fill();
}

function drawKittyOnKangaroo(x, y){
  drawKangaroo(x, y + box * 0.15);
  drawHelloKitty(x + box * 0.15, y - box * 0.1);
}
